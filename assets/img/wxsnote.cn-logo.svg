<style type="text/css">
	  /* 保留原有的fill-rule和clip-rule属性设置 */
      .st0 {
            fill-rule: evenodd;
            clip-rule: evenodd;
            /* 初始透明度设为0，元素不可见 */
            opacity: 0;
            /* 应用名为fadeIn的动画，动画持续时间为2秒，播放次数为1次（即只播放一次），动画结束后保持最后一帧的状态（forwards） */
            animation: fadeIn 2s 1 forwards;
        }

        /* 定义关键帧动画fadeIn */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
	/* 定义初始状态，让元素先在左侧看不见的位置 */
.st1 {
  transform: translateX(-25%); /* 将元素沿X轴向左移动自身宽度的25%，移到左侧屏幕外四分之一处 */
  opacity: 0; /* 初始透明度设为0，使其不可见 */
  fill-rule: evenodd;
  clip-rule: evenodd;
  fill: #EB666E;
  animation: slideIn 2s forwards; /* 添加动画，名称为slideIn，持续时间2秒，forwards表示动画结束后保留最后一帧的状态 */
}

/* 定义动画关键帧，描述动画的起始和结束状态 */
@keyframes slideIn {
  from {
    transform: translateX(-5%); /* 起始从左侧四分之一屏幕外处 */
    opacity: 0;
  }
  to {
    transform: translateX(0); /* 结束移动到初始正常位置，即实现从左侧四分之一处弹出的效果 */
    opacity: 1;
  }
}
	.st2{fill:#EB666E;}
	    /* 定义动画关键帧，实现彩虹色顺时针旋转一圈描边，并控制填充和描边透明度 */
    @keyframes rainbowStroke {
      0% {
        stroke: #ff0000;
        stroke-dasharray: 0, 1000;
        fill-opacity: 0; /* 初始及描边过程中填充透明 */
        stroke-opacity: 1; /* 初始时描边也透明，即完全不显示 */
      } 
      14.28% {
        stroke: #ffa500;
      }
      28.56% {
        stroke: #ffff00;
      }
      42.84% {
        stroke: #008000;
      }
      57.12% {
        stroke: #0000ff;
      }
      71.4% {
        stroke: #4b0082;
      }
      85.68% {
        stroke: #ee82ee;
      }
      100% {
        stroke: #ff0000;
        stroke-dasharray: 900, 0;
        fill-opacity: 1; /* 描边结束填充变为不透明 */
        stroke-opacity: 0; /* 描边结束时让描边不显示 */
      }
    }
    /* 定义一个类，用于初始隐藏所有path元素 */
 .initially-hidden {
      visibility: hidden;
    }
   .cls-2 {
      stroke-width: 2px;
    }
   .color-pink {
      fill: #de636a;
    }
    /* 定义一个动画，用于先将path元素显示出来，设置较短时长让其尽快显示 */
    @keyframes showPathFirst {
      0% {
        visibility: hidden;
      }
      100% {
        visibility: visible;
      }
    }
    /* 针对每个path设置动画，通过animation-delay控制出现顺序 */
 .path-1 {
      animation: showPathFirst 0s 0s forwards, rainbowStroke 2.5s linear 0s forwards;
    }
 .path-2 {
      animation: showPathFirst 0s 0.5s forwards, rainbowStroke 2.5s linear 0.5s forwards;
    }
 .path-3 {
      animation: showPathFirst 0s 1s forwards, rainbowStroke 2.5s linear 1s forwards;
    }
 .path-4 {
      animation: showPathFirst 0s 1.5s forwards, rainbowStroke 2.5s linear 1.5s forwards;
    }
 .path-5 {
      animation: showPathFirst 0s 2s forwards, rainbowStroke 2.5s linear 2s forwards;
    }
</style>
